repos:
  - repo: https://github.com/psf/black
    rev: 24.3.0
    hooks:
      - id: black
        language_version: python3.11
  - repo: https://github.com/pycqa/isort
    rev: 5.15.0
    hooks:
      - id: isort
        name: isort (python)
        language_version: python3.11
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.0.262
    hooks:
      - id: ruff
        args: ["check", "--fix", "src", "tests", "bot"]
